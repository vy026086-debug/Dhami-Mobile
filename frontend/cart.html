<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - Dhami Mobile Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <!-- Navigation -->
    <nav class="bg-blue-600 p-4 text-white flex justify-between items-center shadow-lg mb-6">
        <h1 class="text-2xl font-bold">📱 Dhami Mobile Shop</h1>
        <a href="index.html" class="bg-white text-blue-600 px-4 py-1 rounded hover:bg-gray-100 font-semibold">
            🏠 Back to Shop
        </a>
    </nav>

    <div class="container mx-auto max-w-2xl">
        <h2 class="text-2xl font-bold mb-6 text-blue-800 text-center">🛒 Mera Cart (Dhami Mobile)</h2>
        
        <div id="cart-items" class="bg-white rounded-lg shadow-md p-4 mb-6">
            <!-- Cart items will be displayed here -->
        </div>

        <div class="bg-white p-4 rounded-lg shadow-md">
            <h3 id="total-price" class="text-xl font-bold mb-4">Total: ₹0</h3>
            <button onclick="checkoutWhatsApp()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700">
                🟢 Order on WhatsApp (Confirm Booking)
            </button>
            <button onclick="clearCart()" class="w-full bg-red-500 text-white py-2 rounded-lg font-bold mt-2 hover:bg-red-600">
                🗑️ Clear Cart
            </button>
        </div>
    </div>

    <script>
        function displayCart() {
            let cart = JSON.parse(localStorage.getItem('dhamiCart')) || [];
            const container = document.getElementById('cart-items');
            let total = 0;

            if(cart.length === 0) {
                container.innerHTML = "<p class='text-center text-gray-500 py-8'>Bhai, cart khali hai!</p>";
                return;
            }

            container.innerHTML = cart.map((item, index) => {
                total += item.price;
                return `
                    <div class="flex justify-between items-center border-b py-3">
                        <div>
                            <span class="font-semibold">${item.name}</span>
                            <span class="text-gray-500 text-sm ml-2">Qty: ${item.qty}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="font-bold text-blue-600">₹${item.price}</span>
                            <button onclick="removeFromCart(${index})" class="text-red-500 hover:text-red-700">✕</button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('total-price').innerText = `Total: ₹${total}`;
        }

        function removeFromCart(index) {
            let cart = JSON.parse(localStorage.getItem('dhamiCart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('dhamiCart', JSON.stringify(cart));
            displayCart();
            updateCartCount();
        }

        function clearCart() {
            if(confirm('Are you sure you want to clear the cart?')) {
                localStorage.removeItem('dhamiCart');
                displayCart();
                updateCartCount();
            }
        }

        function updateCartCount() {
            let cart = JSON.parse(localStorage.getItem('dhamiCart')) || [];
            // Update cart count if there's a cart count element on this page
            const cartCountEl = document.getElementById('cart-count');
            if (cartCountEl) {
                cartCountEl.innerText = cart.length;
            }
        }

        function checkoutWhatsApp() {
            let cart = JSON.parse(localStorage.getItem('dhamiCart')) || [];
            
            if (cart.length === 0) {
                alert('Cart is empty! Add some items first.');
                return;
            }

            let itemStr = cart.map(i => `- ${i.name} (₹${i.price}) x${i.qty}`).join('%0A');
            let total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);

            const msg = `Ram Ram Dhami Mobile!📱%0A%0AMera Order:%0A${itemStr}%0A%0A*Total: ₹${total}*%0A%0AMain 2 din mein shop par aa jaunga!`;
            window.open(`https://wa.me/918307968872?text=${msg}`, '_blank');
        }

        // Initialize
        displayCart();
    </script>
</body>
</html>
